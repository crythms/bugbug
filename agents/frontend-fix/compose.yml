services:
  frontend-fix-broker:
    build:
      context: ../..
      dockerfile: agents/frontend-fix/Dockerfile
      target: broker
    environment:
      BUGZILLA_API_URL: ${BUGZILLA_API_URL}
      BUGZILLA_API_KEY: ${BUGZILLA_API_KEY}
    expose:
      - "8765"

  frontend-fix-agent:
    build:
      context: ../..
      dockerfile: agents/frontend-fix/Dockerfile
      target: agent
    environment:
      - RUN_ID
      - BUG_ID=${BUG_ID:?error}
      # The triage plan (frontend-triage summary.json `findings`) as a JSON string.
      - PLAN
      - BUGZILLA_MCP_URL=http://frontend-fix-broker:8765/mcp
      - SOURCE_REPO=/workspace/firefox
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?error}
      # No uploader locally: summary/logs/changes are written under
      # /artifacts/<run_id>, bind-mounted to the host's ~/hackbot/artifacts.
      - ARTIFACTS_DIR=/artifacts
    volumes:
      - workspace:/workspace
      - ${HOME}/hackbot/artifacts:/artifacts
    depends_on:
      frontend-fix-broker:
        condition: service_started

volumes:
  workspace:
